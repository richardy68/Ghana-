<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Pricing Calculator</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #fff;
  padding: 15px;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

.container {
  max-width: 500px;
  margin: auto;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

.item {
  margin-bottom: 12px;
}

label {
  font-size: 14px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 6px;
  border: none;
  font-size: 16px;
}

.total {
  font-size: 20px;
  text-align: center;
  margin-top: 20px;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Solar Pricing Calculator</h2>

  <div class="item">
    <label>Solar Panels Total (₦)</label>
    <input type="number" id="panels">
  </div>

  <div class="item">
    <label>Inverter (₦)</label>
    <input type="number" id="inverter">
  </div>

  <div class="item">
    <label>Battery (₦)</label>
    <input type="number" id="battery">
  </div>

  <div class="item">
    <label>Structure (₦)</label>
    <input type="number" id="structure">
  </div>

  <div class="item">
    <label>Cables & Accessories (₦)</label>
    <input type="number" id="cables">
  </div>

  <div class="item">
    <label>Protection (₦)</label>
    <input type="number" id="protection">
  </div>

  <div class="item">
    <label>Labour (₦)</label>
    <input type="number" id="labour">
  </div>

  <button onclick="calculate()">Calculate Total</button>

  <div class="total" id="total">Total: ₦0</div>
</div>

<script>
function calculate() {
  let ids = ["panels","inverter","battery","structure","cables","protection","labour"];
  let total = 0;

  ids.forEach(id => {
    let value = parseFloat(document.getElementById(id).value) || 0;
    total += value;
  });

  document.getElementById("total").innerText = "Total: ₦" + total.toLocaleString();
}
</script>

</body>
</html>
